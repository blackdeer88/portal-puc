<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Lucas - PUC Minas</title>
    <style>
        body {
            background-color: #004587; /* Azul Puc */
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 40px;
        }
        .logo {
            width: 180px;
            margin-bottom: 10px;
            background-color: white; /* Fundo branco para o logo destacar */
            padding: 10px;
            border-radius: 10px;
        }
        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 250px;
            font-size: 16px;
            margin: 20px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #FFD700; /* Dourado */
            color: #004587;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: white;
            transform: scale(1.05);
        }
        #mensagem {
            font-size: 20px;
            margin-top: 30px;
            font-weight: bold;
        }
   
   </style>

    <div style="background-color: white; color: #004587; padding: 10px; border-radius: 10px; display: inline-block; font-weight: bold; margin-bottom: 20px;">
    PUC MINAS
</div>
    <h1>Portal SI - PUC Minas</h1>
    
    <p id="mensagem">Aguardando seu nome para começar...</p>

    <input type="text" id="campoNome" placeholder="Digite seu nome aqui">
    <br>
    <button onclick="cumprimentar()">Acessar Sistema</button>

    <script>
        function cumprimentar() {
            // Pegamos o valor que você digitou
            const nomeDigitado = document.getElementById("campoNome").value;

            if (nomeDigitado.trim() === "") {
                alert("Digite seu nome antes de entrar!");
            } else {
                // Mudamos o texto da página
                document.getElementById("mensagem").innerHTML = "Bem-vindo ao curso de SI, " + nomeDigitado + "! 🚀";
                document.getElementById("mensagem").style.color = "#FFD700";
            }
        }
    </script>
<img src="fluxograma.png" alt="Fluxograma do Sistema" style="width:100%; max-width:500px; margin-top:20px;">
</body>
</html>
